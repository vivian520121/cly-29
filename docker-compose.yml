version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cly-mysql
    environment:
      MYSQL_ROOT_PASSWORD: cly@2024
      MYSQL_DATABASE: cly_project
      MYSQL_USER: cly
      MYSQL_PASSWORD: cly@2024
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - cly-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cly-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --requirepass cly@2024 --appendonly yes
    networks:
      - cly-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cly-backend
    ports:
      - "8088:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cly_project?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: cly@2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: cly@2024
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - cly-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cly-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cly-network
    restart: unless-stopped

networks:
  cly-network:
    driver: bridge
