spring:
  application:
    name: project-collaboration
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cly.project.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: cly-project-collaboration-secret-key-2024
  expiration: 86400000
  header: Authorization
  prefix: Bearer

file:
  upload-path: ./uploads/
  access-path: /uploads/
  chunk-size: 5242880

logging:
  level:
    com.cly.project: debug
    org.springframework.web: info
